<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Outer hexagon ring -->
  <polygon points="20,2 35.32,11 35.32,29 20,38 4.68,29 4.68,11"
    stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Inner hexagon -->
  <polygon points="20,8 30,13.5 30,26.5 20,32 10,26.5 10,13.5"
    stroke="#e94560" stroke-width="1.2" fill="none" opacity="0.4"/>
  <!-- Clock hour hand -->
  <line x1="20" y1="20" x2="20" y2="12" stroke="#f0f2f5" stroke-width="2" stroke-linecap="round"/>
  <!-- Clock minute hand -->
  <line x1="20" y1="20" x2="27" y2="17" stroke="#f0f2f5" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="20" cy="20" r="2" fill="#e94560"/>
  <!-- Corner accent dots -->
  <circle cx="20" cy="2" r="1.5" fill="#3b82f6" opacity="0.8"/>
  <circle cx="35.32" cy="11" r="1.5" fill="#3b82f6" opacity="0.6"/>
  <circle cx="35.32" cy="29" r="1.5" fill="#3b82f6" opacity="0.6"/>
  <circle cx="20" cy="38" r="1.5" fill="#3b82f6" opacity="0.8"/>
  <circle cx="4.68" cy="29" r="1.5" fill="#3b82f6" opacity="0.6"/>
  <circle cx="4.68" cy="11" r="1.5" fill="#3b82f6" opacity="0.6"/>
</svg>
